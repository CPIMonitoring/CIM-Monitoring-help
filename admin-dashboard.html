<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CIM Admin — UPI Requests</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 20px; }

  /* Login screen */
  .login-box {
    max-width: 360px;
    margin: 80px auto;
    background: #1e293b;
    border-radius: 12px;
    padding: 28px;
    text-align: center;
  }
  .login-box input {
    width: 100%;
    padding: 10px 12px;
    margin: 14px 0;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
  }
  .btn {
    background: #0a6ed1;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn.green { background: #16a34a; }
  .btn.red { background: #dc2626; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #ef4444; font-size: 13px; margin-top: 8px; }

  /* Dashboard */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .filter-tabs { display: flex; gap: 6px; }
  .filter-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    background: #1e293b;
    border: 1px solid #334155;
    color: #94a3b8;
  }
  .filter-tab.active { background: #0a6ed1; border-color: #0a6ed1; color: white; }

  .page-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #334155; }
  .page-tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #94a3b8;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .page-tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }

  .search-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-input {
    flex: 1;
    min-width: 220px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 13px;
  }
  .summary-row { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .summary-card {
    background: #1e293b;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
  }
  .summary-card .num { font-size: 18px; font-weight: 700; display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; background: #1e293b; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: top; }
  tr:hover td { background: #1e293b40; }
  .mono { font-family: monospace; font-size: 12px; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
  .badge.pending { background: #78350f; color: #fbbf24; }
  .badge.approved { background: #14532d; color: #4ade80; }
  .badge.rejected { background: #450a0a; color: #f87171; }
  .actions { display: flex; gap: 6px; }
  .actions .btn { padding: 5px 12px; font-size: 11px; }
  .empty { text-align: center; padding: 40px; opacity: 0.6; }
  .refresh-row { display: flex; align-items: center; gap: 10px; }
  .small-muted { font-size: 11px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div id="loginScreen" class="login-box">
      <h2 style="margin:0 0 8px;">🔒 CIM Admin</h2>
      <p style="font-size:13px; opacity:0.7; margin:0;">Enter the admin password to review UPI requests.</p>
      <input type="password" id="passwordInput" placeholder="Admin password" />
      <button class="btn" id="loginBtn" style="width:100%;">Log In</button>
      <div class="error" id="loginError"></div>
    </div>

    <div id="dashboard" style="display:none;">
      <div class="toolbar">
        <h1 id="pageTitle">💳 UPI Payment Requests</h1>
        <div class="refresh-row">
          <span class="small-muted" id="lastRefreshed"></span>
          <button class="btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

      <div class="page-tabs" id="pageTabs">
        <div class="page-tab active" data-page="upi">UPI Requests</div>
        <div class="page-tab" data-page="licenses">Licenses</div>
        <div class="page-tab" data-page="trials">Trials</div>
      </div>

      <div id="upiPage">
        <div class="filter-tabs" id="filterTabs">
          <div class="filter-tab active" data-filter="pending">Pending</div>
          <div class="filter-tab" data-filter="approved">Approved</div>
          <div class="filter-tab" data-filter="rejected">Rejected</div>
          <div class="filter-tab" data-filter="all">All</div>
        </div>
        <div id="tableContainer"></div>
      </div>

      <div id="licensesPage" style="display:none;">
        <div class="search-row">
          <input id="licenseSearchInput" class="search-input" placeholder="Search by email or license key..." />
          <div class="filter-tabs" id="licenseFilterTabs">
            <div class="filter-tab active" data-filter="all">All</div>
            <div class="filter-tab" data-filter="active">Active</div>
            <div class="filter-tab" data-filter="created">Unactivated</div>
            <div class="filter-tab" data-filter="revoked">Revoked</div>
          </div>
        </div>
        <div id="licensesSummary" class="summary-row"></div>
        <div id="licensesTableContainer"></div>
      </div>

      <div id="trialsPage" style="display:none;">
        <div class="search-row">
          <input id="trialSearchInput" class="search-input" placeholder="Search by install ID..." />
        </div>
        <div id="trialsSummary" class="summary-row"></div>
        <div id="trialsTableContainer"></div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "https://cim-monitoring-license-api.bijayacpiinfo.workers.dev";
  let adminPassword = "";
  let allRequests = [];
  let allLicenses = [];
  let allTrials = [];
  let currentFilter = "pending";
  let currentLicenseFilter = "all";
  let currentPage = "upi";

  const loginScreen = document.getElementById("loginScreen");
  const dashboard = document.getElementById("dashboard");
  const loginError = document.getElementById("loginError");
  const tableContainer = document.getElementById("tableContainer");
  const lastRefreshed = document.getElementById("lastRefreshed");

  async function apiCall(path, extraBody = {}) {
    const res = await fetch(API_BASE + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword, ...extraBody })
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      throw new Error(data?.message || "Request failed (" + res.status + ")");
    }
    return data;
  }

  async function login() {
    const pw = document.getElementById("passwordInput").value;
    const btn = document.getElementById("loginBtn");
    loginError.textContent = "";
    btn.disabled = true;
    btn.textContent = "Checking...";

    adminPassword = pw;

    try {
      await loadRequests();
      loginScreen.style.display = "none";
      dashboard.style.display = "block";
      // Remember for this browser session only — cleared on tab close.
      sessionStorage.setItem("cim_admin_pw", pw);
    } catch (err) {
      loginError.textContent = "❌ " + err.message;
      adminPassword = "";
    } finally {
      btn.disabled = false;
      btn.textContent = "Log In";
    }
  }

  async function loadRequests() {
    const data = await apiCall("/admin/upi-requests");
    allRequests = data.requests || [];
    lastRefreshed.textContent = "Last updated: " + new Date().toLocaleTimeString();
    renderUpi();
  }

  async function loadLicenses() {
    const data = await apiCall("/admin/licenses");
    allLicenses = data.licenses || [];
    lastRefreshed.textContent = "Last updated: " + new Date().toLocaleTimeString();
    renderLicenses();
  }

  async function loadTrials() {
    const data = await apiCall("/admin/trials");
    allTrials = data.trials || [];
    lastRefreshed.textContent = "Last updated: " + new Date().toLocaleTimeString();
    renderTrials();
  }

  function renderUpi() {
    const filtered = currentFilter === "all"
      ? allRequests
      : allRequests.filter(r => r.status === currentFilter);

    if (filtered.length === 0) {
      tableContainer.innerHTML = `<div class="empty">No ${currentFilter === "all" ? "" : currentFilter} requests.</div>`;
      return;
    }

    const rows = filtered.map(r => {
      const date = r.submittedAt ? new Date(r.submittedAt).toLocaleString() : "—";
      const badge = `<span class="badge ${r.status}">${r.status}</span>`;
      const keyDisplay = r.licenseKey ? `<div class="mono" style="color:#4ade80; margin-top:4px;">${escapeHtml(r.licenseKey)}</div>` : "";

      let actions = "";
      if (r.status === "pending") {
        actions = `
          <div class="actions">
            <button class="btn green" data-action="approve" data-tx="${escapeHtml(r.transactionId)}">Approve</button>
            <button class="btn red" data-action="reject" data-tx="${escapeHtml(r.transactionId)}">Reject</button>
          </div>`;
      }

      return `
        <tr>
          <td>${escapeHtml(r.email)}</td>
          <td class="mono">${escapeHtml(r.transactionId)}${keyDisplay}</td>
          <td>${badge}</td>
          <td class="small-muted">${date}</td>
          <td>${actions}</td>
        </tr>`;
    }).join("");

    tableContainer.innerHTML = `
      <table>
        <thead>
          <tr><th>Email</th><th>Transaction ID</th><th>Status</th><th>Submitted</th><th>Actions</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    tableContainer.querySelectorAll("[data-action]").forEach(btn => {
      btn.addEventListener("click", () => handleAction(btn.dataset.action, btn.dataset.tx, btn));
    });
  }

  function renderLicenses() {
    const search = (document.getElementById("licenseSearchInput").value || "").trim().toLowerCase();

    let filtered = allLicenses;
    if (currentLicenseFilter !== "all") {
      filtered = filtered.filter(l => l.status === currentLicenseFilter);
    }
    if (search) {
      filtered = filtered.filter(l =>
        l.email.toLowerCase().includes(search) || l.licenseKey.toLowerCase().includes(search)
      );
    }

    const total = allLicenses.length;
    const active = allLicenses.filter(l => l.status === "active").length;
    const created = allLicenses.filter(l => l.status === "created").length;
    const revoked = allLicenses.filter(l => l.status === "revoked").length;

    document.getElementById("licensesSummary").innerHTML = `
      <div class="summary-card"><span class="num">${total}</span>Total</div>
      <div class="summary-card"><span class="num" style="color:#4ade80;">${active}</span>Active</div>
      <div class="summary-card"><span class="num" style="color:#fbbf24;">${created}</span>Unactivated</div>
      <div class="summary-card"><span class="num" style="color:#f87171;">${revoked}</span>Revoked</div>
    `;

    const container = document.getElementById("licensesTableContainer");

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty">No matching licenses.</div>`;
      return;
    }

    const rows = filtered.map(l => {
      const badge = `<span class="badge ${l.status === "active" ? "approved" : l.status === "revoked" ? "rejected" : "pending"}">${escapeHtml(l.status)}</span>`;
      const date = l.createdAt ? new Date(l.createdAt).toLocaleDateString() : "—";
      const sourceTag = l.source && l.source !== "order" ? ` <span class="small-muted">(${escapeHtml(l.source)})</span>` : "";
      const linked = l.originalLicenseKey
        ? `<div class="small-muted">from ${escapeHtml(l.originalLicenseKey)}</div>`
        : l.additionalKeyIssued
        ? `<div class="small-muted">additional key issued</div>`
        : "";

      let actions = "";
      if (l.status === "active") {
        actions = `<button class="btn red" data-license-action="revoke" data-key="${escapeHtml(l.licenseKey)}">Revoke</button>`;
      } else if (l.status === "revoked") {
        actions = `<button class="btn green" data-license-action="reactivate" data-key="${escapeHtml(l.licenseKey)}">Reactivate</button>`;
      }

      return `
        <tr>
          <td class="mono">${escapeHtml(l.licenseKey)}${sourceTag}${linked}</td>
          <td>${escapeHtml(l.email)}</td>
          <td>${badge}</td>
          <td class="small-muted">${date}</td>
          <td>${actions}</td>
        </tr>`;
    }).join("");

    container.innerHTML = `
      <table>
        <thead>
          <tr><th>License Key</th><th>Email</th><th>Status</th><th>Created</th><th>Actions</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    container.querySelectorAll("[data-license-action]").forEach(btn => {
      btn.addEventListener("click", () => handleLicenseAction(btn.dataset.licenseAction, btn.dataset.key, btn));
    });
  }

  function renderTrials() {
    const search = (document.getElementById("trialSearchInput").value || "").trim().toLowerCase();

    let filtered = allTrials;
    if (search) {
      filtered = filtered.filter(t => t.installId.toLowerCase().includes(search));
    }

    const total = allTrials.length;
    const stillActive = allTrials.filter(t => t.daysRemaining > 0).length;
    const expired = total - stillActive;

    document.getElementById("trialsSummary").innerHTML = `
      <div class="summary-card"><span class="num">${total}</span>Total Installs</div>
      <div class="summary-card"><span class="num" style="color:#4ade80;">${stillActive}</span>Active Trials</div>
      <div class="summary-card"><span class="num" style="color:#f87171;">${expired}</span>Expired</div>
    `;

    const container = document.getElementById("trialsTableContainer");

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty">No matching trial installs.</div>`;
      return;
    }

    const rows = filtered.map(t => {
      const date = t.startedAt ? new Date(t.startedAt).toLocaleString() : "—";
      const daysColor = t.daysRemaining > 0 ? "#4ade80" : "#f87171";
      return `
        <tr>
          <td class="mono">${escapeHtml(t.installId)}</td>
          <td class="small-muted">${date}</td>
          <td style="color:${daysColor}; font-weight:600;">${t.daysRemaining}</td>
        </tr>`;
    }).join("");

    container.innerHTML = `
      <table>
        <thead>
          <tr><th>Anchor (Install ID or Company Prefix)</th><th>Trial Started</th><th>Days Remaining</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function handleAction(action, transactionId, btn) {
    const confirmMsg = action === "approve"
      ? "Approve this request and create a license key?"
      : "Reject this request? This cannot be undone.";
    if (!confirm(confirmMsg)) return;

    btn.disabled = true;
    btn.textContent = action === "approve" ? "Approving..." : "Rejecting...";

    try {
      const path = action === "approve" ? "/admin/upi-approve" : "/admin/upi-reject";
      await apiCall(path, { transactionId });
      await loadRequests();
    } catch (err) {
      alert("Error: " + err.message);
      btn.disabled = false;
      btn.textContent = action === "approve" ? "Approve" : "Reject";
    }
  }

  async function handleLicenseAction(action, licenseKey, btn) {
    const newStatus = action === "revoke" ? "revoked" : "active";
    const confirmMsg = action === "revoke"
      ? `Revoke license ${licenseKey}? The customer will lose access immediately.`
      : `Reactivate license ${licenseKey}?`;
    if (!confirm(confirmMsg)) return;

    btn.disabled = true;
    btn.textContent = "Working...";

    try {
      await apiCall("/admin/license-update", { licenseKey, status: newStatus });
      await loadLicenses();
    } catch (err) {
      alert("Error: " + err.message);
      btn.disabled = false;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function switchPage(page) {
    currentPage = page;
    document.querySelectorAll(".page-tab").forEach(t => t.classList.toggle("active", t.dataset.page === page));
    document.getElementById("upiPage").style.display = page === "upi" ? "block" : "none";
    document.getElementById("licensesPage").style.display = page === "licenses" ? "block" : "none";
    document.getElementById("trialsPage").style.display = page === "trials" ? "block" : "none";

    const titles = { upi: "💳 UPI Payment Requests", licenses: "🔑 Licenses", trials: "⏳ Trial Installs" };
    document.getElementById("pageTitle").textContent = titles[page];

    if (page === "upi" && allRequests.length === 0) loadRequests();
    if (page === "licenses" && allLicenses.length === 0) loadLicenses();
    if (page === "trials" && allTrials.length === 0) loadTrials();

    if (page === "licenses") renderLicenses();
    if (page === "trials") renderTrials();
  }

  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("passwordInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });

  document.getElementById("refreshBtn").addEventListener("click", () => {
    if (currentPage === "upi") loadRequests();
    if (currentPage === "licenses") loadLicenses();
    if (currentPage === "trials") loadTrials();
  });

  document.getElementById("filterTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".filter-tab");
    if (!tab) return;
    document.querySelectorAll("#filterTabs .filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    renderUpi();
  });

  document.getElementById("licenseFilterTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".filter-tab");
    if (!tab) return;
    document.querySelectorAll("#licenseFilterTabs .filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentLicenseFilter = tab.dataset.filter;
    renderLicenses();
  });

  document.getElementById("pageTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".page-tab");
    if (!tab) return;
    switchPage(tab.dataset.page);
  });

  document.getElementById("licenseSearchInput").addEventListener("input", renderLicenses);
  document.getElementById("trialSearchInput").addEventListener("input", renderTrials);

  // Try to restore session (password kept only in sessionStorage, cleared on tab close)
  const savedPw = sessionStorage.getItem("cim_admin_pw");
  if (savedPw) {
    document.getElementById("passwordInput").value = savedPw;
    login();
  }
</script>
</body>
</html>
