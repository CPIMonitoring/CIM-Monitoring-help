<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CPI Pulse Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #121826;
    --surface-2: #1a2233;
    --surface-3: #212b40;
    --border: #232c40;
    --text: #e8ecf4;
    --text-muted: #8993a8;
    --text-faint: #5c6579;
    --accent: #3b82f6;
    --accent-dim: #1d4ed8;
    --success: #34d399;
    --success-bg: #0f2a20;
    --warning: #fbbf24;
    --warning-bg: #2a2208;
    --danger: #f87171;
    --danger-bg: #2a1414;
    --radius: 10px;
    --radius-sm: 6px;
    --font: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Login screen ─────────────────────────────────────────────── */
  .login-box {
    max-width: 380px;
    margin: 12vh auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
  }
  .login-box .mark {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 20px;
  }
  .login-box h2 { margin: 0 0 6px; font-size: 17px; font-weight: 600; }
  .login-box p { font-size: 13px; color: var(--text-muted); margin: 0; line-height: 1.5; }
  .login-box input {
    width: 100%;
    padding: 11px 14px;
    margin: 18px 0 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box .btn { width: 100%; }

  /* ── Buttons ──────────────────────────────────────────────────── */
  .btn {
    background: var(--surface-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover:not(:disabled) { background: #28324a; border-color: #303c58; }
  #loginBtn, .login-box .btn { background: var(--accent); border-color: var(--accent); }
  #loginBtn:hover:not(:disabled) { background: var(--accent-dim); }
  .btn.green { background: var(--success); border-color: var(--success); color: #06251a; }
  .btn.green:hover:not(:disabled) { filter: brightness(1.08); }
  .btn.red { background: var(--danger); border-color: var(--danger); color: #2a0e0e; }
  .btn.red:hover:not(:disabled) { filter: brightness(1.08); }
  .btn.blue { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.blue:hover:not(:disabled) { background: var(--accent-dim); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 16px; }

  /* ── App shell: sidebar + main ───────────────────────────────── */
  .app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 22px;
    font-weight: 700; font-size: 15px;
  }
  .brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }

  .side-nav { display: flex; flex-direction: column; gap: 2px; }
  .page-tab {
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    border-left: 2px solid transparent;
    transition: background 0.15s, color 0.15s;
  }
  .page-tab:hover { background: var(--surface-2); color: var(--text); }
  .page-tab.active { background: var(--surface-2); color: var(--text); border-left-color: var(--accent); }

  .sidebar-footer {
    margin-top: auto;
    padding: 10px;
    border-top: 1px solid var(--border);
  }

  .main { flex: 1; padding: 28px 32px; min-width: 0; }

  .main-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px;
  }
  .main-header h1 { font-size: 19px; margin: 0; font-weight: 700; }
  .refresh-row { display: flex; align-items: center; gap: 12px; }
  .small-muted { font-size: 11.5px; color: var(--text-faint); }

  /* ── Filters / search ─────────────────────────────────────────── */
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tab {
    padding: 6px 13px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .search-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input {
    flex: 1;
    min-width: 240px;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
  }
  .search-input:focus { border-color: var(--accent); }

  /* ── Summary cards ────────────────────────────────────────────── */
  .summary-row { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 110px;
  }
  .summary-card .num { font-family: var(--mono); font-size: 21px; font-weight: 600; display: block; color: var(--text); margin-bottom: 2px; }

  /* ── Table ────────────────────────────────────────────────────── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 12px 16px;
    background: var(--surface-2);
    color: var(--text-faint);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--surface-2); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { border-left: 3px solid transparent; transition: background 0.12s; }
  tbody tr:hover { background: var(--surface-2); }
  tbody tr.s-active { border-left-color: var(--success); }
  tbody tr.s-pending { border-left-color: var(--warning); }
  tbody tr.s-rejected { border-left-color: var(--danger); }

  .mono { font-family: var(--mono); font-size: 12px; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: 10.5px; font-weight: 600; display: inline-block; letter-spacing: 0.02em; }
  .badge.pending { background: var(--warning-bg); color: var(--warning); }
  .badge.approved { background: var(--success-bg); color: var(--success); }
  .badge.rejected { background: var(--danger-bg); color: var(--danger); }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .actions .btn { padding: 6px 14px; font-size: 11px; min-width: 84px; text-align: center; justify-content: center; }
  .empty { text-align: center; padding: 56px 20px; color: var(--text-faint); font-size: 13px; }

  /* ── Modals (used by inline JS-built overlays) ───────────────── */
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .modal-card table { font-size: 12px; }
  .modal-card th { background: transparent; padding: 6px 8px; }
  .modal-card td { padding: 8px; border-bottom: 1px solid var(--surface-2); }

  @media (max-width: 720px) {
    .app-shell { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 16px; }
    .brand { padding: 0; margin-right: auto; }
    .side-nav { flex-direction: row; }
    .sidebar-footer { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>

      <nav class="side-nav" id="pageTabs">
        <div class="page-tab active" data-page="upi">💳 UPI Requests</div>
        <div class="page-tab" data-page="licenses">🔐 Licenses</div>

      <div class="sidebar-footer">
        <span class="small-muted" id="lastRefreshed"></span>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <h1 id="pageTitle">💳 UPI Payment Requests</h1>
        <div class="refresh-row">
          <button class="btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

      <div id="upiPage">
        <div class="search-row">
          <div class="filter-tabs" id="filterTabs">
            <div class="filter-tab active" data-filter="pending">Pending</div>
            <div class="filter-tab" data-filter="approved">Approved</div>
            <div class="filter-tab" data-filter="rejected">Rejected</div>
            <div class="filter-tab" data-filter="all">All</div>
          </div>
        </div>
        <div id="tableContainer" class="table-card"></div>
      </div>

      <div id="licensesPage" style="display:none;">
        <div class="summary-row" id="licensesSummary"></div>
        <div class="search-row">
          <input id="licenseSearchInput" class="search-input" placeholder="Search by license key..." />
          <div class="filter-tabs" id="licenseFilterTabs">
            <div class="filter-tab active" data-filter="all">All</div>
            <div class="filter-tab" data-filter="active">Active</div>
            <div class="filter-tab" data-filter="created">Unactivated</div>
            <div class="filter-tab" data-filter="revoked">Revoked</div>
          </div>
        </div>
        <div id="licensesTableContainer" class="table-card"></div>
      </div>
    </main>
  </div>

<script>
  const API_BASE = "https://cim-monitoring-license-api.integrationmonitorcim.workers.dev";
  let adminPassword = "";
  let allRequests = [];
  let allLicenses = [];
  let currentFilter = "pending";
  let currentLicenseFilter = "all";
  let currentPage = "upi";

  const loginScreen = document.getElementById("loginScreen");
  const dashboard = document.getElementById("dashboard");
  const loginError = document.getElementById("loginError");
  const tableContainer = document.getElementById("tableContainer");
  const lastRefreshed = document.getElementById("lastRefreshed");

  async function apiCall(path, extraBody = {}) {
    const res = await fetch(API_BASE + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword, ...extraBody })
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      throw new Error(data?.message || "Request failed (" + res.status + ")");
    }
    return data;
  }

  async function login() {
    const pw = document.getElementById("passwordInput").value;
    const btn = document.getElementById("loginBtn");
    loginError.textContent = "";
    btn.disabled = true;
    btn.textContent = "Checking...";

    adminPassword = pw;

    try {
      await loadRequests();
      loginScreen.style.display = "none";
      dashboard.style.display = "flex";
      // Remember for this browser session only — cleared on tab close.
      sessionStorage.setItem("cim_admin_pw", pw);
    } catch (err) {
      loginError.textContent = "❌ " + err.message;
      adminPassword = "";
    } finally {
      btn.disabled = false;
      btn.textContent = "Log In";
    }
  }

  async function loadRequests() {
    const data = await apiCall("/admin/upi-requests");
    allRequests = data.requests || [];
    lastRefreshed.textContent = "Last updated: " + new Date().toLocaleTimeString();
    renderUpi();
  }

  async function loadLicenses() {
    const data = await apiCall("/admin/licenses");
    allLicenses = data.licenses || [];
    lastRefreshed.textContent = "Last updated: " + new Date().toLocaleTimeString();
    renderLicenses();
  }

  function renderUpi() {
    const filtered = currentFilter === "all"
      ? allRequests
      : allRequests.filter(r => r.status === currentFilter);

    if (filtered.length === 0) {
      tableContainer.innerHTML = `<div class="empty">No ${currentFilter === "all" ? "" : currentFilter} requests.</div>`;
      return;
    }

    const rowClass = { pending: "s-pending", approved: "s-active", rejected: "s-rejected" };

    const rows = filtered.map(r => {
      const date = r.submittedAt ? new Date(r.submittedAt).toLocaleString() : "—";
      const badge = `<span class="badge ${r.status}">${r.status}</span>`;
      const keyDisplay = r.licenseKey ? `<div class="mono" style="color:var(--success); margin-top:4px;">${escapeHtml(r.licenseKey)}</div>` : "";

      let actions = "";
      if (r.status === "pending") {
        actions = `
          <div class="actions">
            <button class="btn green" data-action="approve" data-tx="${escapeHtml(r.transactionId)}">Approve</button>
            <button class="btn red" data-action="reject" data-tx="${escapeHtml(r.transactionId)}">Reject</button>
          </div>`;
      }

      return `
        <tr class="${rowClass[r.status] || ""}">
          <td class="mono">${escapeHtml(r.transactionId)}${keyDisplay}</td>
          <td>${badge}</td>
          <td class="small-muted">${date}</td>
          <td>${actions}</td>
        </tr>`;
    }).join("");

    tableContainer.innerHTML = `
      <table>
        <thead>
          <tr><th>Transaction ID</th><th>Status</th><th>Submitted</th><th>Actions</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    tableContainer.querySelectorAll("[data-action]").forEach(btn => {
      btn.addEventListener("click", () => handleAction(btn.dataset.action, btn.dataset.tx, btn));
    });
  }

  function renderLicenses() {
    const search = (document.getElementById("licenseSearchInput").value || "").trim().toLowerCase();

    let filtered = allLicenses;
    if (currentLicenseFilter !== "all") {
      filtered = filtered.filter(l => l.status === currentLicenseFilter);
    }
    if (search) {
      filtered = filtered.filter(l =>
        l.licenseKey.toLowerCase().includes(search)
      );
    }

    const total = allLicenses.length;
    const active = allLicenses.filter(l => l.status === "active").length;
    const created = allLicenses.filter(l => l.status === "created").length;
    const revoked = allLicenses.filter(l => l.status === "revoked").length;

    document.getElementById("licensesSummary").innerHTML = `
      <div class="summary-card"><span class="num">${total}</span>Total</div>
      <div class="summary-card"><span class="num" style="color:var(--success);">${active}</span>Active</div>
      <div class="summary-card"><span class="num" style="color:var(--warning);">${created}</span>Unactivated</div>
      <div class="summary-card"><span class="num" style="color:var(--danger);">${revoked}</span>Revoked</div>
    `;

    const container = document.getElementById("licensesTableContainer");

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty">No matching licenses.</div>`;
      return;
    }

    const rowClass = { active: "s-active", created: "s-pending", revoked: "s-rejected" };

    const rows = filtered.map(l => {
      const badge = `<span class="badge ${l.status === "active" ? "approved" : l.status === "revoked" ? "rejected" : "pending"}">${escapeHtml(l.status)}</span>`;
      const date = l.createdAt ? new Date(l.createdAt).toLocaleDateString() : "—";
      const sourceTag = l.source && l.source !== "order" ? ` <span class="small-muted">(${escapeHtml(l.source)})</span>` : "";
      const linked = l.originalLicenseKey
        ? `<div class="small-muted">from ${escapeHtml(l.originalLicenseKey)}</div>`
        : l.additionalKeyIssued
        ? `<div class="small-muted">additional key issued</div>`
        : "";

      let actions = "";
      if (l.status === "active") {
        actions = `<button class="btn red" data-license-action="revoke" data-key="${escapeHtml(l.licenseKey)}">Revoke</button>`;
      } else if (l.status === "revoked") {
        actions = `<button class="btn green" data-license-action="reactivate" data-key="${escapeHtml(l.licenseKey)}">Reactivate</button>`;
      }

      if (l.orderid && l.source !== "upi") {
        actions += `<button class="btn blue" data-view-order="${escapeHtml(l.orderid)}">View Order</button>`;
      } else if (l.source === "upi") {
        actions += `<button class="btn blue" data-view-upi-info="1"
          data-orderid="${escapeHtml(l.orderid || "")}"
          data-txn="${escapeHtml(l.transactionId || "")}"
          data-created="${escapeHtml(l.createdAt || "")}">View Order</button>`;
      }
      actions = `<div class="actions">${actions}</div>`;

      const deviceCount = l.recentDeviceCount ?? 0;
      const deviceColor = deviceCount >= 5 ? "var(--danger)" : deviceCount >= 3 ? "var(--warning)" : "var(--success)";
      const deviceCell = `
        <div class="mono" style="color:${deviceColor}; font-weight:600;">${deviceCount}/5</div>
        ${(l.deviceHistory && l.deviceHistory.length)
          ? `<button class="btn blue" style="padding:3px 8px; font-size:10px; min-width:0; margin-top:4px;" data-view-devices="${escapeHtml(l.licenseKey)}">View</button>`
          : `<span class="small-muted">none yet</span>`}
      `;

      return `
        <tr class="${rowClass[l.status] || ""}">
          <td class="mono">${escapeHtml(l.licenseKey)}${sourceTag}${linked}</td>
          <td>${badge}</td>
          <td class="small-muted">${date}</td>
          <td>${deviceCell}</td>
          <td>${actions}</td>
        </tr>`;
    }).join("");

    container.innerHTML = `
      <table>
        <thead>
          <tr><th>License Key</th><th>Status</th><th>Created</th><th>Devices</th><th>Actions</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    container.querySelectorAll("[data-license-action]").forEach(btn => {
      btn.addEventListener("click", () => handleLicenseAction(btn.dataset.licenseAction, btn.dataset.key, btn));
    });

    container.querySelectorAll("[data-view-order]").forEach(btn => {
      btn.addEventListener("click", () => showOrderDetails(btn.dataset.viewOrder, btn));
    });

    container.querySelectorAll("[data-view-upi-info]").forEach(btn => {
      btn.addEventListener("click", () => showUpiOrderInfo(btn.dataset.orderid, btn.dataset.txn, btn.dataset.created));
    });

    container.querySelectorAll("[data-view-devices]").forEach(btn => {
      btn.addEventListener("click", () => showDeviceHistory(btn.dataset.viewDevices));
    });
  }

  function showDeviceHistory(licenseKey) {
    const license = allLicenses.find(l => l.licenseKey === licenseKey);
    if (!license) return;

    const history = (license.deviceHistory || [])
      .slice()
      .sort((a, b) => new Date(b.activatedAt) - new Date(a.activatedAt));

    const rows = history.map(h => {
      const isCurrent = h.deviceId === license.deviceId;
      return `
        <tr>
          <td class="mono" style="font-size:11px;">${escapeHtml(h.deviceId)}${isCurrent ? ' <span class="badge approved" style="margin-left:4px;">current</span>' : ""}</td>
          <td class="small-muted">${new Date(h.activatedAt).toLocaleString()}</td>
        </tr>`;
    }).join("");

    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;";
    overlay.innerHTML = `
      <div class="modal-card" style="max-width:520px; width:100%; max-height:80vh; overflow-y:auto;">
        <h3 style="margin:0 0 4px; font-size:15px;">📱 Device Activation History</h3>
        <p class="small-muted" style="margin:0 0 16px;">${escapeHtml(licenseKey)} — ${history.length} device${history.length !== 1 ? "s" : ""} in the past year</p>
        <table style="width:100%;">
          <thead><tr><th>Device ID</th><th>Activated</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="2" class="small-muted" style="padding:12px;">No activation history yet.</td></tr>'}</tbody>
        </table>
        <div style="text-align:right; margin-top:16px;">
          <button class="btn" id="closeDeviceModal">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector("#closeDeviceModal").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
  }

  // UPI-sourced licenses have no real Lemon Squeezy order — their "order"
  // only ever existed in our own Firestore (a generated orderid + the raw
  // transaction reference the customer submitted). Calling /admin/order-details
  // for these always fails since Lemon Squeezy has never heard of them, so
  // this shows what we actually do have on file instead of hitting their API.
  function showUpiOrderInfo(orderId, transactionId, createdAt) {
    const rows = [
      ["Payment Method", "UPI"],
      ["Generated Order ID", orderId || "—"],
      ["UPI Transaction ID", transactionId || "—"],
      ["License Created", createdAt ? new Date(createdAt).toLocaleString() : "—"],
    ].map(([label, value]) => `
      <tr><td class="small-muted" style="width:160px;">${escapeHtml(label)}</td><td>${escapeHtml(String(value))}</td></tr>
    `).join("");

    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;";
    overlay.innerHTML = `
      <div class="modal-card" style="max-width:480px; width:100%;">
        <h3 style="margin:0 0 8px; font-size:15px;">📱 UPI Order Info</h3>
        <p class="small-muted" style="margin:0 0 16px;">UPI payments aren't processed through Lemon Squeezy, so there's no order to look up there — this is everything we have on file for this payment.</p>
        <table style="width:100%;">${rows}</table>
        <div style="text-align:right; margin-top:16px;">
          <button class="btn" id="closeUpiOrderModal">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector("#closeUpiOrderModal").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
  }

  async function showOrderDetails(orderId, btn) {
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Loading...";

    try {
      const data = await apiCall("/admin/order-details", { orderId });
      const o = data.order;

      const rows = [
        ["Order #", o.orderNumber],
        ["Product", o.variantName ? `${o.productName} — ${o.variantName}` : o.productName],
        ["Status", o.statusFormatted + (o.testMode ? " (test mode)" : "")],
        ["Total", `${o.totalFormatted} ${o.currency}`],
        ["Subtotal", o.subtotalFormatted],
        ["Discount", o.discountTotalFormatted],
        ["Tax", o.taxFormatted],
        ["Refunded", o.refunded ? `Yes (${new Date(o.refundedAt).toLocaleString()})` : "No"],
        ["Created", new Date(o.createdAt).toLocaleString()],
        ["Order ID", o.identifier],
      ].map(([label, value]) => `
        <tr><td class="small-muted" style="width:120px;">${escapeHtml(label)}</td><td>${escapeHtml(String(value))}</td></tr>
      `).join("");

      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;";
      overlay.innerHTML = `
        <div class="modal-card" style="max-width:480px; width:100%;">
          <h3 style="margin:0 0 16px; font-size:15px;">💳 Order Details</h3>
          <table style="width:100%;">${rows}</table>
          <div style="text-align:right; margin-top:16px;">
            <button class="btn" id="closeOrderModal">Close</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector("#closeOrderModal").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
    } catch (err) {
      alert("Error fetching order: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }

  async function handleAction(action, transactionId, btn) {
    const confirmMsg = action === "approve"
      ? "Approve this request and create a license key?"
      : "Reject this request? This cannot be undone.";
    if (!confirm(confirmMsg)) return;

    btn.disabled = true;
    btn.textContent = action === "approve" ? "Approving..." : "Rejecting...";

    try {
      const path = action === "approve" ? "/admin/upi-approve" : "/admin/upi-reject";
      await apiCall(path, { transactionId });
      await loadRequests();
    } catch (err) {
      alert("Error: " + err.message);
      btn.disabled = false;
      btn.textContent = action === "approve" ? "Approve" : "Reject";
    }
  }

  async function handleLicenseAction(action, licenseKey, btn) {
    const newStatus = action === "revoke" ? "revoked" : "active";
    const confirmMsg = action === "revoke"
      ? `Revoke license ${licenseKey}? The customer will lose access immediately.`
      : `Reactivate license ${licenseKey}?`;
    if (!confirm(confirmMsg)) return;

    btn.disabled = true;
    btn.textContent = "Working...";

    try {
      await apiCall("/admin/license-update", { licenseKey, status: newStatus });
      await loadLicenses();
    } catch (err) {
      alert("Error: " + err.message);
      btn.disabled = false;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function switchPage(page) {
    currentPage = page;
    document.querySelectorAll(".page-tab").forEach(t => t.classList.toggle("active", t.dataset.page === page));
    document.getElementById("upiPage").style.display = page === "upi" ? "block" : "none";
    document.getElementById("licensesPage").style.display = page === "licenses" ? "block" : "none";

    const titles = { upi: "💳 UPI Payment Requests", licenses: "🔑 Licenses" };
    document.getElementById("pageTitle").textContent = titles[page];

    if (page === "upi" && allRequests.length === 0) loadRequests();
    if (page === "licenses" && allLicenses.length === 0) loadLicenses();

    if (page === "licenses") renderLicenses();
  }

  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("passwordInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });

  document.getElementById("refreshBtn").addEventListener("click", () => {
    if (currentPage === "upi") loadRequests();
    if (currentPage === "licenses") loadLicenses();
  });

  document.getElementById("filterTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".filter-tab");
    if (!tab) return;
    document.querySelectorAll("#filterTabs .filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    renderUpi();
  });

  document.getElementById("licenseFilterTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".filter-tab");
    if (!tab) return;
    document.querySelectorAll("#licenseFilterTabs .filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentLicenseFilter = tab.dataset.filter;
    renderLicenses();
  });

  document.getElementById("pageTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".page-tab");
    if (!tab) return;
    switchPage(tab.dataset.page);
  });

  document.getElementById("licenseSearchInput").addEventListener("input", renderLicenses);

  // Try to restore session (password kept only in sessionStorage, cleared on tab close)
  const savedPw = sessionStorage.getItem("cim_admin_pw");
  if (savedPw) {
    document.getElementById("passwordInput").value = savedPw;
    login();
  }
</script>
</body>
</html>
